<div class="profile-container" #profileContainer>
  <div class="profile-header">
    <div class="header-icon">
      <i class="fa-solid fa-user-edit"></i>
    </div>
    <h2>Profile Settings</h2>
    <p>Update your personal information</p>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading profile...</p>
  </div>

  <div *ngIf="!isLoading && userProfile" class="profile-content">
    <div *ngIf="successText" class="success-alert" #successMessage>
      <i class="fa-solid fa-check-circle"></i> {{ successText }}
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="firstName" formControlName="firstName" placeholder="Enter first name"
                 [class.invalid]="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched">
        </div>
        <div class="error-msg" *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched">
          First name is required (min 2 chars)
        </div>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="lastName" formControlName="lastName" placeholder="Enter last name"
                 [class.invalid]="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched">
        </div>
        <div class="error-msg" *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched">
          Last name is required (min 2 chars)
        </div>
      </div>

      <div class="form-group disabled-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" formControlName="email" readonly>
        </div>
        <small class="help-text"><i class="fa-solid fa-info-circle"></i> Email address cannot be changed.</small>
      </div>

      <div class="form-group disabled-group">
        <label>Account Role</label>
        <div class="role-badge">
          {{ userProfile.role }}
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="profileForm.invalid || isSaving">
          <i class="fa-solid fa-save" *ngIf="!isSaving"></i>
          <i class="fa-solid fa-spinner fa-spin" *ngIf="isSaving"></i>
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
