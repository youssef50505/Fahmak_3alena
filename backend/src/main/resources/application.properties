spring.application.name=fahmak-alena-backend

# H2 Database Configuration (In-Memory)
spring.datasource.url=jdbc:h2:mem:fahmak_alena
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console — Disabled by default for security. Enable via env var for dev only.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Server Port
server.port=8080

# Active Profile
spring.profiles.active=dev

# OpenAI Configuration — Must be set via environment variable
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=${OPENAI_API_URL:https://api.groq.com/openai/v1/chat/completions}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}

# JWT Configuration — Secret must be set via environment variable
jwt.secret=${JWT_SECRET:fahmak-alena-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}
jwt.expiration=86400000

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}

# Facebook OAuth2
facebook.app.id=${FACEBOOK_APP_ID:your-facebook-app-id}
facebook.app.secret=${FACEBOOK_APP_SECRET:your-facebook-app-secret}

# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY:sk_test_dummy_key_change_me}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_dummy_secret_change_me}
